name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: 628fc32e0cdad7e4674a80615f9c8d2a
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip when Cloudflare token is not configured
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "::notice::Skipping Cloudflare deploy because CLOUDFLARE_API_TOKEN is not configured."
          echo "::notice::Add a Cloudflare API token with Workers Scripts/Edit permissions to enable push deployments."

      - name: Setup Node.js
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm ci

      - name: Deploy to Cloudflare Workers
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm run deploy
